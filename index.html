<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Notes</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="watermark-day" id="watermarkDay"></div>
  <div class="watermark-month" id="watermarkMonth"></div>

  <header class="header">
    <button class="nav-btn" id="prevDay" aria-label="Giorno precedente">&#8592;</button>
    <h1 class="current-date" id="currentDate" title="Clicca per scegliere data"></h1>
    <button class="nav-btn" id="nextDay" aria-label="Giorno successivo">&#8594;</button>
  </header>

  <main class="main">
    <ul class="todo-list" id="todoList"></ul>
  </main>

  <button class="fab" id="addTodo" aria-label="Aggiungi TODO">+</button>

  <!-- Modal: Date Picker -->
  <div class="modal-overlay hidden" id="dateModal">
    <div class="modal">
      <h2>Scegli data</h2>
      <input type="date" id="datePicker" />
      <div class="modal-actions">
        <button id="dateConfirm">Conferma</button>
        <button id="dateCancel" class="btn-secondary">Annulla</button>
      </div>
    </div>
  </div>

  <!-- Modal: Note Editor -->
  <div class="modal-overlay hidden" id="noteModal">
    <div class="modal modal-note">
      <h2 id="noteModalTitle"></h2>
      <textarea id="noteContent" placeholder="Scrivi qui le note..."></textarea>
      <div class="modal-actions">
        <button id="noteSave">Salva</button>
        <button id="noteCancel" class="btn-secondary">Annulla</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
