<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="watermark-day" id="watermarkDay"></div>
  <div class="watermark-month" id="watermarkMonth"></div>

  <header class="header">
    <button class="nav-btn" id="prevDay" aria-label="Giorno precedente">&#8592;</button>
    <div class="header-center">
      <h1 class="current-date" id="currentDate" title="Clicca per scegliere data"></h1>
      <button class="today-chip hidden" id="goToday">Oggi</button>
    </div>
    <button class="nav-btn" id="nextDay" aria-label="Giorno successivo">&#8594;</button>
  </header>

  <main class="main">

    <!-- Dashboard -->
    <div id="dashboardView" class="view view--active">
      <div class="dashboard-grid" id="dashboardGrid"></div>
    </div>

    <!-- To-do list -->
    <div id="todoView" class="view">
      <ul class="todo-list" id="todoList"></ul>
    </div>

    <!-- Pagine (note multipagina) -->
    <div id="pagesView" class="view">
      <div class="pages-list" id="pagesList"></div>
      <div class="page-toolbar" id="pageToolbar">
        <button class="ptb-btn" data-cmd="bold" title="Grassetto" aria-label="Grassetto"><b>B</b></button>
        <button class="ptb-btn" data-cmd="italic" title="Corsivo" aria-label="Corsivo"><i>I</i></button>
        <button class="ptb-btn" data-cmd="strikeThrough" title="Sbarrato" aria-label="Sbarrato"><s>S</s></button>
        <div class="ptb-sep"></div>
        <div class="ptb-color-wrap">
          <button class="ptb-btn ptb-color-btn" id="ptbColor" title="Colore testo" aria-label="Colore testo">
            <span class="ptb-color-swatch" id="ptbColorSwatch"></span>
          </button>
          <div class="ptb-color-pop hidden" id="ptbColorPop"></div>
        </div>
        <div class="ptb-sep"></div>
        <button class="ptb-btn" data-cmd="insertUnorderedList" title="Elenco puntato" aria-label="Elenco puntato"></button>
        <button class="ptb-btn" data-cmd="insertOrderedList" title="Elenco numerato" aria-label="Elenco numerato"></button>
        <div class="ptb-sep"></div>
        <button class="ptb-btn ptb-font-btn" id="ptbFontInc" title="Aumenta carattere" aria-label="Aumenta carattere">A+</button>
        <button class="ptb-btn ptb-font-btn" id="ptbFontDec" title="Riduci carattere" aria-label="Riduci carattere">A−</button>
        <div class="ptb-sep"></div>
        <button class="ptb-btn" id="ptbZoomIn"  title="Zoom in"  aria-label="Zoom in"></button>
        <button class="ptb-btn" id="ptbZoomOut" title="Zoom out" aria-label="Zoom out"></button>
      </div>
    </div>

    <!-- Task Manager (Kanban) -->
    <div id="taskView" class="view">
      <div class="kanban-board" id="kanbanBoard"></div>
    </div>

    <!-- Note -->
    <div id="notesView" class="view">
      <div class="notes-canvas-wrap" id="notesCanvasWrap">
        <div class="notes-canvas" id="notesCanvas"></div>
      </div>
      <div class="notes-zoom-bar">
        <button class="nzb-btn" id="nzbPlus">+</button>
        <span class="nzb-pct" id="nzbPct">100%</span>
        <button class="nzb-btn" id="nzbMinus">&#8722;</button>
        <div class="nzb-sep"></div>
        <button class="nzb-btn" id="nzbGrid" aria-label="Griglia"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></button>
        <button class="nzb-btn" id="nzbHoriz" aria-label="Orizzontale"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="6" height="10" rx="1.5"/><rect x="9" y="7" width="6" height="10" rx="1.5"/><rect x="16" y="7" width="6" height="10" rx="1.5"/></svg></button>
        <button class="nzb-btn" id="nzbVert" aria-label="Verticale"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="2" width="10" height="6" rx="1.5"/><rect x="7" y="9" width="10" height="6" rx="1.5"/><rect x="7" y="16" width="10" height="6" rx="1.5"/></svg></button>
        <div class="nzb-sep"></div>
        <button class="nzb-btn" id="nzbPrev" aria-label="Precedente"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg></button>
        <button class="nzb-btn" id="nzbNext" aria-label="Successivo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button>
        <div class="nzb-sep"></div>
        <button class="nzb-btn nzb-btn--danger" id="nzbClearConn" aria-label="Elimina connessioni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/><line x1="2" y1="2" x2="22" y2="22"/></svg></button>
        <button class="nzb-btn nzb-btn--danger" id="nzbClearAll" aria-label="Elimina tutti i post-it"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>
      </div>
    </div>

  </main>

  <button class="fab hidden" id="addTodo" aria-label="Aggiungi TODO">+</button>

  <!-- Bottom dock -->
  <div class="bottom-dock hidden" id="bottomDock">
    <button class="back-btn" id="backBtn">Dashboard</button>
  </div>

  <!-- Modal: Task Editor -->
  <div class="modal-overlay hidden" id="taskModal">
    <div class="modal modal-task">
      <input class="tm-title" id="tmTitle" type="text" placeholder="Titolo task…" autocomplete="off" spellcheck="false" />
      <div class="tm-tags-wrap">
        <div class="tm-tag-list" id="tmTagList"></div>
        <div class="tm-new-tag-row">
          <input class="tm-tag-input" id="tmTagInput" type="text" placeholder="Nuovo tag… (Invio per aggiungere)" autocomplete="off" />
          <div class="tm-tc-dots" id="tmTagColors"></div>
        </div>
        <div class="tm-tag-repo" id="tmTagRepo"></div>
      </div>
      <textarea id="tmBody" class="tm-body" placeholder="Descrizione…"></textarea>
      <div class="tm-checklist-wrap" id="tmChecklistWrap">
        <div class="tm-checklist-items" id="tmChecklistItems"></div>
        <div class="tm-checklist-add">
          <input class="tm-check-input" id="tmCheckInput" type="text" placeholder="Aggiungi voce checklist… (Invio)" autocomplete="off" />
          <button class="tm-check-add-btn" id="tmCheckAddBtn" type="button">+</button>
        </div>
      </div>
      <div class="tm-assignees-wrap" id="tmAssigneesWrap">
        <div class="tm-assignee-list" id="tmAssigneeList"></div>
        <div class="tm-assignee-input-row">
          <svg class="tm-assignee-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input class="tm-assignee-input" id="tmAssigneeInput" type="text" placeholder="Aggiungi operatore… (Invio)" autocomplete="off" />
        </div>
        <div class="tm-assignee-repo" id="tmAssigneeRepo"></div>
      </div>
      <div class="tm-colors" id="tmColors"></div>
      <div class="modal-actions">
        <button id="tmDelete" class="btn-danger hidden">Elimina task</button>
      </div>
    </div>
  </div>

  <!-- Modal: Note Editor -->
  <div class="modal-overlay hidden" id="noteModal">
    <div class="modal modal-note">
      <label for="noteModalTitle"></label><input class="note-title-input" id="noteModalTitle" type="text" placeholder="Titolo..." spellcheck="false" autocomplete="off" />
      <div class="note-colors" id="noteColors"></div>
      <label for="noteContent"></label>
      <textarea id="noteContent" placeholder="Scrivi qui le note..."></textarea>
      <div class="modal-actions">
        <button id="noteSave">Salva</button>
        <button id="noteCancel" class="btn-secondary">Annulla</button>
      </div>
    </div>
  </div>

  <!-- Calendar and Time picker are injected by their respective JS files -->

  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/state.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/timepicker.js"></script>
  <script src="js/actionsheet.js"></script>
  <script src="js/todos.js"></script>
  <script src="js/modals.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/notes.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/tasks.js"></script>
  <script src="js/app.js"></script>
  <script src="js/reminder.js"></script>
</body>
</html>
